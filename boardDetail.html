<!doctype html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>부트스트랩 활용 게시판</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
</head>

<body>
    <div class="container">
        <div class="header border-bottom mb-4">
            <h1>생성형 AI 융합서비스 개발자과정 2회차</h1>
        </div>
        <div class="row">
            <div class="col-12">
                <form>
                    <div class="mb-3">
                        <label for="title" class="form-label">제목:</label>
                        <span>글제목</span>
                    </div>
                    <div class="mb-3">
                        <label for="author" class="form-label">작성자:</label>
                        <span>작성자 1</span>
                    </div>
                    <div class="mb-3">
                        <label for="content" class="form-label">내용:</label>
                        <span>게시글 내용이 여기에 표시됩니다.</span>
                    </div>
                    <div class="mb-3">
                        <label for="file" class="form-label">파일:</label>
                        <a href="" download="">다운로드</a>
                    </div>
                    <a href="/board/update/1" class="btn btn-primary">수정</a>
                    <a href="/board/delete/1" class="btn btn-danger">삭제</a>
                    <a href="/board/" class="btn btn-secondary">목록</a>
                </form>
            </div>
        </div>
        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
            integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
            crossorigin="anonymous"></script>
</body>

</html>
